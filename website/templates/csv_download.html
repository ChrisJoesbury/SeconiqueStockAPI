<!-- templates/csv_download.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Page metadata -->
  <meta charset="UTF-8" />
  <title>CSV Download</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Stylesheet -->
  <link rel="stylesheet" href="{% static 'css/templateStyles.css' %}">
</head>
<body class="login-page">
  <!-- Main content container -->
  <main class="container" role="main">
    <!-- Download card section -->
    <section class="card" aria-labelledby="download-title">
      <!-- Minimal header -->
      <h1 id="download-title" style="text-align: center; margin-bottom: 1.5rem; font-size: 1.2rem; color: var(--text); font-weight: normal;">
        Stock Levels CSV Download
      </h1>

      <!-- API Key input form -->
      <form id="csv-download-form" style="display: grid; gap: 1rem;">
        <!-- API Key field -->
        <div class="field">
          <label for="api-key-input">API Key</label>
          <input 
            type="text" 
            id="api-key-input" 
            class="input" 
            placeholder="Enter API key"
            required
            autocomplete="off"
          />
        </div>

        <!-- Error message display -->
        <div id="error-message" class="alert alert--error" role="alert" style="display: none;"></div>

        <!-- Success message display -->
        <div id="success-message" class="alert" role="status" style="display: none;"></div>

        <!-- Download button -->
        <button type="submit" class="btn" id="download-btn">
          Download CSV
        </button>
      </form>

      <!-- Loading indicator -->
      <div id="loading-indicator" style="display: none; text-align: center; margin-top: 1rem; color: var(--muted);">
        <p>Downloading CSV file...</p>
      </div>

    </section>
  </main>

  <!-- JavaScript functionality -->
  <script>
    (function () {
      // Get form and elements
      const form = document.getElementById('csv-download-form');
      const apiKeyInput = document.getElementById('api-key-input');
      const downloadBtn = document.getElementById('download-btn');
      const errorMessage = document.getElementById('error-message');
      const successMessage = document.getElementById('success-message');
      const loadingIndicator = document.getElementById('loading-indicator');

      // Function to show error message
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
        successMessage.style.display = 'none';
      }

      // Function to hide error message
      function hideError() {
        errorMessage.style.display = 'none';
      }

      // Function to show success message
      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
      }

      // Function to hide success message
      function hideSuccess() {
        successMessage.style.display = 'none';
      }

      // Handle form submission
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Hide previous messages
        hideError();
        hideSuccess();
        
        // Get API key value
        const apiKey = apiKeyInput.value.trim();
        
        // Validate API key is not empty
        if (!apiKey) {
          showError('Please enter your API key.');
          apiKeyInput.focus();
          return;
        }
        
        // Show loading indicator
        loadingIndicator.style.display = 'block';
        downloadBtn.disabled = true;
        downloadBtn.textContent = 'Downloading...';
        
        try {
          // Fetch CSV with API key authentication
          const response = await fetch('/stocklevels/csv/', {
            method: 'GET',
            headers: {
              'Authorization': `Api-Key ${apiKey}`,
            },
          });
          
          // Check if response is OK
          if (!response.ok) {
            // Try to get error message from response
            let errorText = 'Failed to download CSV. ';
            try {
              const errorData = await response.json();
              if (errorData.detail) {
                errorText += errorData.detail;
              } else if (errorData.message) {
                errorText += errorData.message;
              } else {
                errorText += `Server returned status ${response.status}.`;
              }
            } catch (e) {
              errorText += `Server returned status ${response.status}.`;
            }
            showError(errorText);
            loadingIndicator.style.display = 'none';
            downloadBtn.disabled = false;
            downloadBtn.textContent = 'Download CSV';
            return;
          }
          
          // Get the CSV data as blob
          const blob = await response.blob();
          
          // Create download link
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'stocklevels.csv';
          document.body.appendChild(a);
          a.click();
          
          // Clean up
          window.URL.revokeObjectURL(url);
          document.body.removeChild(a);
          
          // Show success message
          showSuccess('CSV file downloaded successfully!');
          
          // Clear API key input for security
          apiKeyInput.value = '';
          
        } catch (error) {
          // Handle network or other errors
          showError('An error occurred while downloading the CSV. Please check your internet connection and try again.');
          console.error('Download error:', error);
        } finally {
          // Hide loading indicator and re-enable button
          loadingIndicator.style.display = 'none';
          downloadBtn.disabled = false;
          downloadBtn.textContent = 'Download CSV';
        }
      });

      // Clear error message when user starts typing
      apiKeyInput.addEventListener('input', function() {
        if (errorMessage.style.display === 'block') {
          hideError();
        }
      });
    })();
  </script>
</body>
</html>
